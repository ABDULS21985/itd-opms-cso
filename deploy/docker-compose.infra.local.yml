# Temp infra override for local run — Postgres remapped to 5440 to avoid the
# policybot-db-1 conflict on 5432. Reuses the existing itd-opms-api_* volumes so
# no data is lost. Generated for a local perf/render check.
services:
  postgres:
    image: postgres:16-alpine
    container_name: opms-postgres
    ports:
      - "127.0.0.1:5440:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-opms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opms_secret}
      POSTGRES_DB: ${DB_NAME:-itd_opms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opms} -d ${DB_NAME:-itd_opms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: opms-redis
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: opms-minio
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-opms_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-opms_minio_secret}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    container_name: opms-nats
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    command: -js -sd /data -m 8222
    volumes:
      - natsdata:/data
    restart: unless-stopped

volumes:
  pgdata:
    external: true
    name: itd-opms-api_pgdata
  redisdata:
    external: true
    name: itd-opms-api_redisdata
  miniodata:
    external: true
    name: itd-opms-api_miniodata
  natsdata:
    external: true
    name: itd-opms-api_natsdata
