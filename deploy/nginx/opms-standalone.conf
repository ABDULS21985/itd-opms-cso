# ITD-OPMS standalone reverse proxy (inside opms-uat-nginx container).
# Routes /api/* to the Go API and everything else to the Next.js portal.

upstream opms_api {
    server api:8089;
}

upstream opms_portal {
    server portal:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # ── API → Go backend ──────────────────────────────
    location /api/ {
        proxy_pass http://opms_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Portal → Next.js (with websocket/HMR upgrade support) ──
    location / {
        proxy_pass http://opms_portal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
