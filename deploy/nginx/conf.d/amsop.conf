# ──────────────────────────────────────────────
# amsop.org — Main site (portal + API)
# ──────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name amsop.org www.amsop.org monitor.amsop.org;

    # ACME challenge for Let's Encrypt (if not using Cloudflare Origin certs)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────
# HTTPS — amsop.org (portal + API)
# ──────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name amsop.org www.amsop.org;

    # SSL — Cloudflare Origin Certificate
    ssl_certificate /etc/letsencrypt/live/amsop.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amsop.org/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── API routes ──────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts for file uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 55m;
    }

    # Stricter rate limit on auth endpoints
    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Portal (Next.js) ────────────────────────
    location / {
        proxy_pass http://portal_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static assets caching ───────────────────
    location /_next/static/ {
        proxy_pass http://portal_backend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health endpoint (no rate limit)
    location = /api/v1/health {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}

# ──────────────────────────────────────────────
# HTTPS — monitor.amsop.org (Grafana)
# ──────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name monitor.amsop.org;

    ssl_certificate /etc/letsencrypt/live/amsop.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amsop.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
