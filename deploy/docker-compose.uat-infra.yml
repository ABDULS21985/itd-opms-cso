name: ${COMPOSE_PROJECT_NAME:-opms-uat}

x-uat-logging: &uat-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-20m}
    max-file: ${DOCKER_LOG_MAX_FILE:-5}

x-service-defaults: &service-defaults
  init: true
  logging: *uat-logging
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-opms-uat-postgres}
    environment:
      POSTGRES_USER: ${DB_USER:-opms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-itd_opms}
    ports:
      - "${INFRA_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opms} -d ${DB_NAME:-itd_opms}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - opms-uat-net

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-opms-uat-redis}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --maxmemory-policy allkeys-lru --requirepass "$${REDIS_PASSWORD}"
    ports:
      - "${INFRA_BIND_ADDRESS:-127.0.0.1}:${REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - opms-uat-net

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-opms-uat-minio}
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    command: server /data --console-address ":9001"
    ports:
      - "${INFRA_BIND_ADDRESS:-127.0.0.1}:${MINIO_HOST_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_HOST_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - opms-uat-net

  nats:
    <<: *service-defaults
    image: nats:2.11-alpine
    container_name: ${NATS_CONTAINER_NAME:-opms-uat-nats}
    command: -js -sd /data -m 8222
    ports:
      - "${INFRA_BIND_ADDRESS:-127.0.0.1}:${NATS_HOST_PORT:-4222}:4222"
      - "${NATS_MONITOR_BIND_ADDRESS:-127.0.0.1}:${NATS_MONITOR_HOST_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - opms-uat-net

networks:
  opms-uat-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nats_data:
