# ──────────────────────────────────────────────────────────────
# ITD-OPMS — self-contained stack (infra + API + Portal + Nginx)
# ──────────────────────────────────────────────────────────────
# Designed to COEXIST with other stacks on a shared host:
#   - Unique compose project name (itd-opms-uat) and container names.
#   - All infra host ports remapped + bound to 127.0.0.1 only.
#   - Single public port (8090) for the Nginx entrypoint.
#   - App<->infra traffic uses the internal docker network (service names).
#
# Usage (from this deploy/ directory):
#   docker compose -f docker-compose.standalone.yml --env-file .env up -d --build
# ──────────────────────────────────────────────────────────────

name: itd-opms-uat

networks:
  opms:
    driver: bridge

volumes:
  opms_pgdata:
  opms_redisdata:
  opms_miniodata:
  opms_natsdata:

services:
  postgres:
    image: postgres:16-alpine
    container_name: opms-uat-postgres
    networks: [opms]
    ports:
      - "127.0.0.1:5436:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - opms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: opms-uat-redis
    networks: [opms]
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6383:6379"
    volumes:
      - opms_redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: opms-uat-minio
    networks: [opms]
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - opms_miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    container_name: opms-uat-nats
    networks: [opms]
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "127.0.0.1:4223:4222"
      - "127.0.0.1:8223:8222"
    volumes:
      - opms_natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ../itd-opms-api
    image: itd-opms-api:uat
    container_name: opms-uat-api
    networks: [opms]
    ports:
      - "127.0.0.1:18089:8089"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8089"
      SERVER_ENV: production
      FRONTEND_URL: ${PUBLIC_URL}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      DB_RLS_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: info
      LOG_FORMAT: json
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio: {condition: service_healthy}
      nats: {condition: service_healthy}
    restart: unless-stopped

  portal:
    build:
      context: ../itd-opms-portal
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api/v1
    image: itd-opms-portal:uat
    container_name: opms-uat-portal
    networks: [opms]
    ports:
      - "127.0.0.1:3005:3000"
    environment:
      NODE_ENV: production
    healthcheck:
      # 127.0.0.1, not localhost: Next binds IPv4 0.0.0.0; localhost may resolve to IPv6 [::1].
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: opms-uat-nginx
    networks: [opms]
    ports:
      - "8090:80"
    volumes:
      - ./nginx/opms-standalone.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - portal
    restart: unless-stopped
