apiVersion: 1

providers:
  - name: "ITD-OPMS Dashboards"
    orgId: 1
    folder: "ITD-OPMS"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
