# Production Docker Compose for ITD-OPMS
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    environment:
      SERVER_ENV: production
      LOG_LEVEL: info
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
      -c max_connections=200
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='cp %p /var/lib/postgresql/wal_archive/%f'
      -c log_min_duration_statement=500
    volumes:
      - postgres_wal_archive:/var/lib/postgresql/wal_archive
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  minio:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      MINIO_SERVER_ENCRYPTION: "on"

  nats:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  grafana:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  prometheus:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  loki:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  tempo:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  postgres_wal_archive:
