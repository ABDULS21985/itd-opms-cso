global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeat_interval: 15m
    - match:
        severity: high
      receiver: 'high-alerts'
      repeat_interval: 1h
    - match:
        severity: medium
      receiver: 'medium-alerts'
      repeat_interval: 4h

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://api:8080/api/v1/notifications/webhook/alertmanager'
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://api:8080/api/v1/notifications/webhook/alertmanager'
        send_resolved: true

  - name: 'high-alerts'
    webhook_configs:
      - url: 'http://api:8080/api/v1/notifications/webhook/alertmanager'
        send_resolved: true

  - name: 'medium-alerts'
    webhook_configs:
      - url: 'http://api:8080/api/v1/notifications/webhook/alertmanager'
        send_resolved: true
