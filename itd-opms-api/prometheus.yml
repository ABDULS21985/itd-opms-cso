# ──────────────────────────────────────────────
# Prometheus Scrape Configuration
# ──────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: itd-opms-api
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: itd-opms-api
          environment: development
