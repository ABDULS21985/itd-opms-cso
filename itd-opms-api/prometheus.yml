# ──────────────────────────────────────────────
# Prometheus Scrape Configuration
# ──────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: itd-opms-api
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: itd-opms-api
          environment: development
