# ──────────────────────────────────────────────
# ITD-OPMS Development Stack
# ──────────────────────────────────────────────
# Usage:
#   docker compose up -d          — start all services
#   docker compose up -d api      — start API + dependencies only
#   docker compose logs -f api    — tail API logs
#   docker compose down -v        — tear down everything (including volumes)
# ──────────────────────────────────────────────

services:
  # ── Application ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opms-api
    ports:
      - "8089:8089"
    env_file:
      - .env
    environment:
      # Override host values so the container reaches sibling services by name
      DB_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
      - monitoring
    restart: unless-stopped

  # ── Data Stores ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: opms
      POSTGRES_PASSWORD: opms_secret
      POSTGRES_DB: itd_opms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U opms -d itd_opms" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: opms-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - backend
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: opms-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: opms_minio
      MINIO_ROOT_PASSWORD: opms_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    container_name: opms-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
    command: -js -sd /data -m 8222
    volumes:
      - natsdata:/data
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - backend
    restart: unless-stopped

  # ── Observability ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: opms-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--storage.tsdb.retention.size=5GB"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    depends_on:
      - api
    networks:
      - monitoring
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: opms-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: opms-grafana
    ports:
      - "3001:3000" # 3001 on host to avoid conflict with Next.js on 3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - monitoring
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: opms-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: opms-tempo
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "3200:3200" # Tempo HTTP API
    volumes:
      - ./tempo.yml:/etc/tempo/tempo.yaml:ro
    command: -config.file=/etc/tempo/tempo.yaml
    networks:
      - backend
      - monitoring
    restart: unless-stopped

# ── Networks ─────────────────────────────────
networks:
  backend:
    driver: bridge
  monitoring:
    driver: bridge

# ── Volumes ──────────────────────────────────
volumes:
  pgdata:
  redisdata:
  miniodata:
  natsdata:
  grafanadata:
