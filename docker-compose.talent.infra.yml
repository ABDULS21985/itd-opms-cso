# Infrastructure-only Docker Compose for Talent Platform UAT
# Apps (talent-api, talent-portal) run via PM2 on the host
# This file runs only PostgreSQL and Redis in containers

services:
  talent-postgres:
    image: postgres:16-alpine
    container_name: digibit-talent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TALENT_DB_USER:-talent_portal}
      POSTGRES_PASSWORD: ${TALENT_DB_PASSWORD}
      POSTGRES_DB: ${TALENT_DB_NAME:-talent_portal_db}
    ports:
      - "${TALENT_DB_PORT:-5434}:5432"
    volumes:
      - talent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TALENT_DB_USER:-talent_portal} -d ${TALENT_DB_NAME:-talent_portal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  talent-redis:
    image: redis:7-alpine
    container_name: digibit-talent-redis
    restart: unless-stopped
    ports:
      - "${TALENT_REDIS_PORT:-6380}:6379"
    volumes:
      - talent_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  talent_postgres_data:
    driver: local
  talent_redis_data:
    driver: local
