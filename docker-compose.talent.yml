services:
  talent-portal:
    image: ${DOCKERHUB_USERNAME}/digibit-talent-portal:latest
    container_name: digibit-talent-portal
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - /root/.env/digibit.env
    environment:
      - NEXT_PUBLIC_TALENT_API_URL=http://talent-api:4002/api/v1
      - NEXT_PUBLIC_MAIN_SITE_URL=https://digibit.com
    depends_on:
      - talent-api

  talent-api:
    image: ${DOCKERHUB_USERNAME}/digibit-talent-api:latest
    container_name: digibit-talent-api
    restart: unless-stopped
    ports:
      - "4002:4002"
    env_file:
      - /root/.env/digibit.env
    environment:
      - PORT=4002
      - DB_HOST=talent-postgres
      - DB_PORT=5432
      - DB_USER=talent_portal
      - DB_PASSWORD=${TALENT_DB_PASSWORD}
      - DB_NAME=talent_portal_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      talent-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  talent-postgres:
    image: postgres:16-alpine
    container_name: digiweb-talent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: talent_portal
      POSTGRES_PASSWORD: ${TALENT_DB_PASSWORD}
      POSTGRES_DB: talent_portal_db
    ports:
      - "5434:5432"
    volumes:
      - talent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talent_portal -d talent_portal_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: talent-redis
    restart: unless-stopped
    ports:
      - "${TALENT_REDIS_PORT:-6380}:6379"
    volumes:
      - talent_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  talent_postgres_data:
  talent_redis_data:
